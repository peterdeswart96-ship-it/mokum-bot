name: Deploy to GitHub Pages and Azure Functions

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://mokum-bot-api-enchhkeydye0fnek.westeurope-01.azurewebsites.net

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: ${{ github.ref_name == 'main' && 'gh-pages' || 'gh-pages-develop' }}

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        run: npm install
        working-directory: ./api

      - name: Create zip
        run: |
          cd api
          zip -r ../api.zip .

     - name: Deploy via Kudu zip deploy
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP '(?<=userName=")[^"]+')
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP '(?<=userPWD=")[^"]+')
          echo "USERNAME lengte: ${#USERNAME}"
          echo "PASSWORD lengte: ${#PASSWORD}"
          
          curl -X POST \
            "https://mokum-bot-api-enchhkeydye0fnek.scm.westeurope-01.azurewebsites.net/api/zipdeploy" \
            -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/zip" \
            --data-binary @api.zip \
            --fail \
            --silent \
            --show-error
          
          echo "Backend deploy geslaagd"
