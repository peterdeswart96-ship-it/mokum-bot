name: Deploy to GitHub Pages and Azure Functions
on:
  push:
    branches:
      - main
      - develop
jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://mokum-bot-api-enchhkeydye0fnek.westeurope-01.azurewebsites.net
      - name: Inject CNAME for main
        if: github.ref_name == 'main'
        run: echo "mokum-bot.pdscloud.nl" > ./dist/CNAME
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: ${{ github.ref_name == 'main' && 'gh-pages' || 'gh-pages-develop' }}
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # vereist voor OIDC token exchange met Azure
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install API dependencies
        run: npm install
        working-directory: ./api
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: mokum-bot-api
          package: ./api
          scm-do-build-during-deployment: false
          enable-oryx-build: false
