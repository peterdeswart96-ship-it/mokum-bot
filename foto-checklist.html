<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>📷 Fotolijst Mokum — afvinkbaar</title>
<style>
  :root { --red:#cc0000; --bg:#0d0d0d; --card:#161616; --border:#2a2a2a; --anthracite:#26262b; --gray:#888; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; background:var(--bg); color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; padding:0 0 80px; }
  header { position:sticky; top:0; z-index:10; background:#0d0d0dF2; backdrop-filter:blur(8px); border-bottom:1px solid var(--border); padding:14px 16px; }
  h1 { font-size:17px; margin:0 0 8px; letter-spacing:.04em; }
  h1 small { color:var(--red); font-weight:600; }
  .progressbar { height:8px; background:#222; border-radius:6px; overflow:hidden; }
  .progressfill { height:100%; background:var(--red); width:0%; transition:width .25s ease; }
  .progresstext { font-size:12px; color:var(--gray); margin-top:6px; display:flex; justify-content:space-between; align-items:center; }
  .reset { background:none; border:1px solid var(--border); color:var(--gray); font-size:11px; border-radius:6px; padding:3px 8px; cursor:pointer; }
  main { padding:12px 16px; max-width:680px; margin:0 auto; }
  .cat { margin:18px 0 8px; font-size:13px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:#fff; }
  label { display:flex; align-items:flex-start; gap:12px; padding:13px 14px; background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; cursor:pointer; line-height:1.4; font-size:15px; transition:background .12s, border-color .12s; }
  label:active { background:#1d1d1d; }
  label.done { border-color:#2f5a36; background:#15211780; }
  label.done .txt { text-decoration:line-through; color:var(--gray); }
  label.al { opacity:.6; }
  input[type=checkbox] { appearance:none; -webkit-appearance:none; width:24px; height:24px; min-width:24px; border:2px solid #555; border-radius:7px; margin:0; position:relative; cursor:pointer; transition:all .12s; }
  input[type=checkbox]:checked { background:var(--red); border-color:var(--red); }
  input[type=checkbox]:checked::after { content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px; font-weight:bold; }
  .badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; margin-left:6px; vertical-align:middle; white-space:nowrap; }
  .badge.al { background:#1f3a25; color:#7bd88f; }
  .badge.venster { background:#2a2a3a; color:#9b9bff; }
  .hint { font-size:12px; color:var(--gray); margin-top:2px; }
  .intro { font-size:13px; color:#bbb; background:var(--anthracite); border:1px solid var(--border); border-radius:10px; padding:11px 13px; margin:12px 0; line-height:1.5; }
  footer { text-align:center; color:#555; font-size:11px; padding:20px; }
</style>
</head>
<body>
<header>
  <h1>📷 Fotolijst Mokum <small>— afvinkbaar</small></h1>
  <div class="progressbar"><div class="progressfill" id="fill"></div></div>
  <div class="progresstext"><span id="ptext">0 / 0</span> <button class="reset" onclick="resetAll()">Reset</button></div>
</header>
<main>
  <div class="intro">Vink af terwijl je fotografeert. Je vinkjes worden op dit apparaat bewaard (ook na afsluiten). Liggend (landscape) werkt het best. ✅ = al aanwezig in de bot. 🙂 Bij uploaden worden gezichten standaard door smilies vervangen (AVG).</div>
  <div id="lijst"></div>
</main>
<footer>Mokum Pool &amp; Darts · fotolijst</footer>

<script>
const DATA = [
  { cat: "🎱 Pool & Biljart", items: [
    { t: "Poolzaal-overzicht met Buffalo-tafels", al: true },
    { t: "9-ball break (close-up van opgezette ballen)", al: true },
    { t: "Eén nette pooltafel van opzij, met keu + krijt" },
    { t: "Detail van de pockets / het laken" },
    { t: "Carambole/biljarttafel (indien aanwezig)" },
    { t: "Tafelnummering / het tafel-bord" },
  ]},
  { cat: "🎯 Darts", items: [
    { t: "Dartborden aan de wand (overzicht)", al: true },
    { t: "Eén verlicht dartbord van dichtbij, met pijlen erin" },
    { t: "Speelvloer voor de borden (oche/afstand)" },
    { t: "Winmau-bord detail (merk)" },
  ]},
  { cat: "🛝 Shuffleboard", items: [
    { t: "Shuffleboard met puck + bar op achtergrond", al: true },
    { t: "Shuffleboard van bovenaf/zijkant, hele baan" },
    { t: "Detail van de pucks / het zand" },
  ]},
  { cat: "🕹️ Game tafel & gezelschapsspellen", items: [
    { t: "De digitale game tafel (aan, met spel op scherm)" },
    { t: "De stamtafel met gezelschapsspellen (bordspellen)" },
    { t: "Detail van een paar populaire spellen" },
  ]},
  { cat: "🍺 Eten & Drinken", items: [
    { t: "De bar frontaal (MOKUM-letters, taps)", al: true },
    { t: "Menukaart", venster: true, al: true },
    { t: "Tapbieren / bierkranen van dichtbij" },
    { t: "Een paar gerechten / borrelplank" },
    { t: "Cocktails / koffie" },
  ]},
  { cat: "🛋️ Sfeer / Lounge / Interieur", items: [
    { t: "De lounge met planten en ramen", al: true },
    { t: "Zithoek / loungebanken (gezellig)" },
    { t: "Sfeerbeeld 's avonds (verlichting aan)" },
    { t: "Groepsplek / grote tafel (voor groepen/feestjes)" },
  ]},
  { cat: "📍 Locatie & Parkeren", items: [
    { t: "Logo op de gevel / pui", al: true },
    { t: "De ingang vanaf de straat" },
    { t: "Straatbeeld / omgeving (Nobelweg)" },
    { t: "Parkeerplek / parkeerbord" },
  ]},
  { cat: "🏆 Toernooien", items: [
    { t: "Toernooi in volle gang (volle zaal, mensen spelen)" },
    { t: "Prijzentafel / bekers / prijzengeld-bord" },
    { t: "Inschrijf-/scorebord of scherm met standen" },
  ]},
  { cat: "📖 Spelregels (illustratie)", items: [
    { t: "8-ball / 9-ball / 10-ball / 14.1 rack-diagrammen", al: true },
    { t: "Eigen foto van een opgezette break op een Mokum-tafel" },
  ]},
  { cat: "📺 Sport kijken", items: [
    { t: "De schermen / grote tv('s)" },
  ]},
  { cat: "🔧 Keu reparatie & 🛒 Accessoires", items: [
    { t: "De keu-reparatie/werkplek of een keu in reparatie" },
    { t: "Keuen in het rek (assortiment)" },
    { t: "Accessoires (krijt, handschoen, koffer)" },
  ]},
  { cat: "🎓 Clinics & Coaching", items: [
    { t: "Coach/instructeur met leerling aan de tafel" },
    { t: "Groepsclinic (meerdere mensen)" },
  ]},
  { cat: "🎱 14.1 Summer League", items: [
    { t: "De 14.1 / straight pool tafel in gebruik" },
  ]},
];

const KEY = "mokum-fotolijst-v1";
let state = {};
try { state = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch (e) { state = {}; }

function idFor(c, i) { return c + "::" + i; }

function render() {
  const lijst = document.getElementById("lijst");
  let html = "";
  DATA.forEach((groep, gi) => {
    html += `<div class="cat">${groep.cat}</div>`;
    groep.items.forEach((item, ii) => {
      const id = idFor(gi, ii);
      const checked = item.al || !!state[id];
      const cls = (checked ? "done " : "") + (item.al ? "al" : "");
      const badge = item.al ? '<span class="badge al">al aanwezig</span>'
        : (item.venster ? '<span class="badge venster">apart venster</span>' : "");
      html += `<label class="${cls}" data-id="${id}">
        <input type="checkbox" ${checked ? "checked" : ""} ${item.al ? "disabled" : ""} onchange="toggle('${id}', this)">
        <span class="txt">${item.t}${badge}</span>
      </label>`;
    });
  });
  lijst.innerHTML = html;
  updateProgress();
}

function toggle(id, el) {
  state[id] = el.checked;
  localStorage.setItem(KEY, JSON.stringify(state));
  el.closest("label").classList.toggle("done", el.checked);
  updateProgress();
}

function updateProgress() {
  let total = 0, done = 0;
  DATA.forEach((groep, gi) => groep.items.forEach((item, ii) => {
    if (item.al) return; // 'al aanwezig' telt niet mee als te-maken
    total++;
    if (state[idFor(gi, ii)]) done++;
  }));
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("fill").style.width = pct + "%";
  document.getElementById("ptext").textContent = `${done} / ${total} gemaakt (${pct}%)`;
}

function resetAll() {
  if (!confirm("Alle vinkjes wissen?")) return;
  state = {};
  localStorage.removeItem(KEY);
  render();
}

render();
</script>
</body>
</html>
